<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 4px;
            background: #0070f3;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0051a2;
        }
        input {
            padding: 8px;
            margin: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 250px;
        }
        #debug-console {
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Checkout Test Page</h1>
    
    <div>
        <button data-product-type="basic" class="checkout-button">
            Buy Basic Package
        </button>
        <button data-product-type="pro" class="checkout-button">
            Buy Pro Package
        </button>
    </div>

    <!-- Load Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
    
    <!-- Load your checkout script -->
    <script src="webflow-memberstack-checkout.js"></script>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, initializing checkout...');
            initializeCheckoutButtons();
        });
    </script>
</body>
</html>
